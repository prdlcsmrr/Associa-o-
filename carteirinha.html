<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteirinha Funcional</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#888; font-family:'Arial',sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; min-height:100vh; }

.controls {
  background:#1a2a5e; border-radius:12px; padding:14px 20px;
  display:flex; gap:10px; align-items:center; margin-bottom:20px;
  flex-wrap:wrap; justify-content:center;
}
.controls h2 { color:#c9972a; font-size:15px; font-weight:800; }
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; text-transform:uppercase; }
.btn-gold { background:#c9972a; color:#000; }
.btn-navy { background:#fff; color:#1a2a5e; }
.btn-green { background:#2a7a38; color:#fff; }

#carteirinha { display:flex; gap:4px; }

/* ═══ CARD BASE ═══ */
.card {
  width: 500px;
  height: 316px;
  position: relative;
  overflow: hidden;
  background: #f5f5f0;
  font-family: Arial, sans-serif;
}

/* FAIXA BANDEIRA */
.flag-stripe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.flag-stripe::before {
  content: '';
  position: absolute;
  top: -30px; left: -40px;
  width: 220px; height: 400px;
  background: linear-gradient(
    140deg,
    rgba(0,150,57,0.35) 0%,
    rgba(0,150,57,0.4) 25%,
    rgba(255,220,0,0.35) 45%,
    rgba(0,39,118,0.3) 65%,
    transparent 80%
  );
  transform: skewX(-5deg);
}

/* MARCA D'ÁGUA TREM */
.wm-trem {
  position: absolute;
  right: -10px; bottom: 20px;
  font-size: 110px;
  opacity: 0.05;
  z-index: 0;
  pointer-events: none;
  transform: rotate(-5deg);
}

/* ═══ FRENTE ═══ */
.f-header {
  position: absolute;
  top: 8px; left: 130px; right: 80px;
  text-align: center;
  z-index: 2;
}
.f-h1 { font-size: 7.5px; font-weight: 700; color: #111; letter-spacing: 0.3px; text-transform: uppercase; }
.f-h2 { font-size: 13px; font-weight: 900; color: #cc0000; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.1; }
.f-h3 { font-size: 6.5px; font-weight: 700; color: #111; text-transform: uppercase; margin-top: 1px; }
.f-h4 { font-size: 7px; font-weight: 700; color: #111; margin-top: 1px; }
.f-h5 { font-size: 7px; color: #333; margin-top: 1px; }

/* BRASÃO CANTO DIREITO */
.f-brasao-dir {
  position: absolute;
  top: 6px; right: 6px;
  width: 55px; height: 55px;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  opacity: 0.85;
}
.f-brasao-dir img { width: 100%; }

/* FOTO */
.f-photo {
  position: absolute;
  left: 10px; top: 8px;
  width: 95px; height: 125px;
  border: 1px solid #bbb;
  background: #ddd;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.f-photo img { width:100%; height:100%; object-fit:cover; }
.f-photo-ph { font-size:9px; color:#aaa; text-align:center; }

/* MATRÍCULA */
.f-mat {
  position: absolute;
  left: 8px; top: 138px;
  width: 108px;
  text-align: center;
  z-index: 2;
}
.f-mat-lbl { font-size: 7px; font-weight: 700; color: #333; text-transform: uppercase; }
.f-mat-num { font-size: 11px; font-weight: 800; color: #111; }

/* LOGO + NOME */
.f-logo {
  position: absolute;
  left: 8px; top: 168px;
  width: 108px;
  display: flex; align-items: center; gap: 4px;
  z-index: 2;
}
.f-logo-img { width: 32px; height: 32px; object-fit: contain; }
.f-logo-txt { font-size: 16px; font-weight: 900; color: #1a2a5e; letter-spacing: 0.5px; }

/* DADOS FRENTE */
.f-dados {
  position: absolute;
  left: 118px; top: 72px; right: 8px;
  z-index: 2;
}
.fd-lbl { font-size: 7px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.2px; margin-top: 7px; margin-bottom: 1px; }
.fd-lbl:first-child { margin-top: 0; }
.fd-val { font-size: 10px; font-weight: 800; color: #111; line-height: 1.2; }
.fd-val.lg { font-size: 12px; }
.fd-row { display: flex; gap: 16px; margin-top: 6px; }
.fd-col { flex: 1; }

/* RODAPÉ FRENTE */
.f-footer {
  position: absolute;
  bottom: 5px; left: 8px; right: 8px;
  text-align: center;
  border-top: 0.5px solid #bbb;
  padding-top: 4px;
  z-index: 2;
}
.f-footer p { font-size: 5.5px; color: #333; line-height: 1.5; font-weight: 600; }

/* ═══ VERSO ═══ */
.v-top {
  position: absolute;
  top: 6px; left: 8px; right: 8px;
  border-bottom: 0.5px solid #bbb;
  padding-bottom: 5px;
  z-index: 2;
}
.v-top p { font-size: 6px; color: #111; line-height: 1.5; font-weight: 600; }

.v-dados {
  position: absolute;
  top: 44px; left: 8px; right: 140px;
  z-index: 2;
}
.vd-lbl { font-size: 7px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.2px; margin-top: 6px; margin-bottom: 1px; }
.vd-lbl:first-child { margin-top: 0; }
.vd-val { font-size: 9.5px; font-weight: 700; color: #111; line-height: 1.3; }
.v-row { display: flex; gap: 12px; margin-top: 6px; }
.v-col { flex: 1; }

/* DIGITAL */
.v-digital {
  position: absolute;
  bottom: 42px; left: 8px;
  width: 55px; height: 55px;
  border: 1px solid #999;
  background: #eee;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  font-size: 32px;
  filter: grayscale(1) contrast(0.7);
}

/* ASSINATURAS */
.v-sigs {
  position: absolute;
  bottom: 25px; left: 68px; right: 145px;
  z-index: 2;
}
.v-sig { text-align: center; }
.v-sig-line { border-bottom: 0.5px solid #555; height: 24px; margin-bottom: 2px; }
.v-sig-cursive { font-size: 8px; color: #333; font-style: italic; font-family: Georgia, serif; margin-bottom: 2px; }
.v-sig-lbl { font-size: 6px; color: #333; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

/* QR CODE */
.v-qr {
  position: absolute;
  top: 42px; right: 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  z-index: 2;
}
.v-qr img { width: 80px; height: 80px; }
.v-qr-lbl { font-size: 6px; font-weight: 700; color: #555; text-transform: uppercase; }

/* BRASÃO CIDADE */
.v-brasao {
  position: absolute;
  bottom: 30px; right: 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  z-index: 2;
}
.v-brasao-img { width: 45px; height: 45px; object-fit: contain; }
.v-cidade { font-size: 6.5px; font-weight: 700; color: #1a2a5e; text-transform: uppercase; text-align: center; }

/* RODAPÉ VERSO */
.v-footer {
  position: absolute;
  bottom: 5px; left: 8px; right: 8px;
  text-align: center;
  border-top: 0.5px solid #bbb;
  padding-top: 3px;
  z-index: 2;
}
.v-footer p { font-size: 5.5px; color: #333; line-height: 1.5; font-weight: 600; }

.loading { color:#fff; font-size:16px; padding:40px; text-align:center; }
</style>
</head>
<body>

<div class="controls">
  <h2>🪪 CARTEIRINHA FUNCIONAL</h2>
  <button class="btn btn-navy" onclick="window.history.back()">← Voltar</button>
  <button class="btn btn-gold" onclick="downloadPNG()">⬇ PNG</button>
  <button class="btn btn-green" onclick="downloadPDF()">📄 PDF</button>
</div>

<div id="app"><div class="loading">⏳ Carregando...</div></div>

<script>
const DB = 'https://prdlcsmrr.github.io/Associa-o-/db.json';
const BIN = '6a35c2ddda38895dfee044d5';
function fmt(d){if(!d)return'—';return new Date(d+'T12:00').toLocaleDateString('pt-BR');}

async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('app').innerHTML='<div class="loading">❌ ID não fornecido</div>';return;}
  let m=null;
  try{const r=await fetch(DB+'?t='+Date.now());if(r.ok){const d=await r.json();m=d.membros?.find(x=>x.numCred===id);}}catch(e){}
  if(!m){
    try{
      const k=['$2a','$10','$/ZpcJaiH2sQlYIOgef9HUeF8XyuxR7ixmFI8D1oGVTnlkiJn77DJ2'].join('');
      const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':k,'X-Bin-Meta':'false'}});
      if(r.ok){const d=await r.json();m=d.membros?.find(x=>x.numCred===id);}
    }catch(e){}
  }
  if(!m){document.getElementById('app').innerHTML='<div class="loading">❌ Membro não encontrado</div>';return;}
  render(m);
}

function render(m){
  const cfg=JSON.parse(localStorage.getItem('assoc-config')||'{}');
  const orgNome=cfg.assocNome||cfg.nomeAssoc||'ASSOCIAÇÃO';
  const orgSub=cfg.assocCnpj?cfg.assocCnpj:'';
  const orgSub2=cfg.assocEnd||'';
  const diretor=cfg.assocDiretor||'';
  const cidade=cfg.assocCidade||m.municipio||'—';
  const logo=cfg.logo||null;
  const legal=cfg.assocLegal||'TEM FÉ PÚBLICA E VALIDADE EM TODO O TERRITÓRIO NACIONAL\nART. 2º INCISO V DA LEI Nº 12.57 DE 2009; ART. 2º INCISO V DA 10.266, DE 2020';
  const qrUrl='https://prdlcsmrr.github.io/Associa-o-/verificar.html?id='+encodeURIComponent(m.numCred);
  const qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=80x80&color=cc0000&bgcolor=ffffff&data='+encodeURIComponent(qrUrl);
  const filiacao=[m.pai?'Pai: '+m.pai:'',m.mae?'Mãe: '+m.mae:''].filter(Boolean).join('<br>')||'—';

  document.getElementById('app').innerHTML=`
  <div id="carteirinha">

    <!-- FRENTE -->
    <div class="card" id="card-frente">
      <div class="flag-stripe"></div>
      <div class="wm-trem">🚆</div>

      <div class="f-header">
        <div class="f-h1">República Federativa do Brasil</div>
        <div class="f-h2">${orgNome}</div>
        ${orgSub?`<div class="f-h3">${orgSub}</div>`:''}
        ${orgSub2?`<div class="f-h4">${orgSub2}</div>`:''}
      </div>

      <div class="f-brasao-dir">
        ${logo?`<img src="${logo}" style="width:50px;height:50px;object-fit:contain">`:'<div style="font-size:36px;opacity:0.4">🏛️</div>'}
      </div>

      <div class="f-photo">
        ${m.foto?`<img src="${m.foto}" alt="">`:'<div class="f-photo-ph">👤<br>Sem foto</div>'}
      </div>

      <div class="f-mat">
        <div class="f-mat-lbl">Matrícula</div>
        <div class="f-mat-num">${m.numCred.replace('ASC-','')}</div>
      </div>

      <div class="f-logo">
        ${logo?`<img class="f-logo-img" src="${logo}">`:'<span style="font-size:24px">🏛️</span>'}
        <span class="f-logo-txt">${(orgNome||'ASSOC').split(' ')[0]}</span>
      </div>

      <div class="f-dados">
        <div class="fd-lbl">Cargo</div>
        <div class="fd-val lg">${m.cat.toUpperCase()}</div>

        <div class="fd-lbl">Nome</div>
        <div class="fd-val lg">${m.nome}</div>

        <div class="fd-row">
          <div class="fd-col">
            <div class="fd-lbl">CPF</div>
            <div class="fd-val">${m.cpf}</div>
          </div>
          <div class="fd-col">
            <div class="fd-lbl">Data da Expedição</div>
            <div class="fd-val">${fmt(m.emissao)}</div>
          </div>
        </div>

        <div class="fd-lbl">Código Hash</div>
        <div class="fd-val">${m.docId}</div>
      </div>

      <div class="f-footer">
        <p>${legal.replace(/\n/g,'<br>')}</p>
      </div>
    </div>

    <!-- VERSO -->
    <div class="card" id="card-verso">
      <div class="flag-stripe"></div>
      <div class="wm-trem">🚆</div>

      <div class="v-top">
        <p>O TITULAR TEM LIVRE PORTE DE ARMA DE FOGO, COM VALIDADE EM ÂMBITO NACIONAL.<br>
        DECRETO Nº 1.655 DE 1995, LEI Nº 12.696, DE 2003, ART. 30 DO DECRETO Nº 3.647, DE 2019.</p>
      </div>

      <div class="v-dados">
        <div class="vd-lbl">Filiação</div>
        <div class="vd-val">${filiacao}</div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">Naturalidade</div>
            <div class="vd-val">${m.naturalidade||'BRASILEIRO'}</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Validade</div>
            <div class="vd-val">${fmt(m.validade)}</div>
          </div>
        </div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">Data de Nascimento</div>
            <div class="vd-val">${fmt(m.nasc)}</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Data de Admissão</div>
            <div class="vd-val">${fmt(m.emissao)}</div>
          </div>
        </div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">CPF</div>
            <div class="vd-val">${m.cpf} / ${m.sexo?m.sexo.charAt(0):'—'}</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Município</div>
            <div class="vd-val">${m.municipio||cidade}</div>
          </div>
        </div>

        <div style="margin-top:6px">
          <div class="vd-lbl">Situação Funcional</div>
          <div class="vd-val" style="color:${m.status==='Ativo'?'#2a7a38':'#cc0000'};font-size:11px;font-weight:900">${m.status==='Ativo'?'ATIVO':'INATIVO'}</div>
        </div>
      </div>

      <div class="v-digital">👆</div>

      <div class="v-sigs">
        <div class="v-sig">
          <div class="v-sig-cursive">Firma do Círculo do Brasil</div>
          <div class="v-sig-line"></div>
          <div class="v-sig-lbl">Diretor/Geral</div>
        </div>
        <div class="v-sig" style="margin-top:4px">
          <div class="v-sig-line"></div>
          <div class="v-sig-lbl">Assinatura</div>
        </div>
      </div>

      <div class="v-qr">
        <img src="${qrSrc}" alt="QR" crossorigin="anonymous">
        <div class="v-qr-lbl">Base Legal</div>
      </div>

      <div class="v-brasao">
        ${logo?`<img class="v-brasao-img" src="${logo}">`:'<div style="font-size:28px">🏛️</div>'}
        <div class="v-cidade">${cidade}</div>
      </div>

      <div class="v-footer">
        <p>${legal.replace(/\n/g,'<br>')}</p>
      </div>
    </div>

  </div>`;
}

async function downloadPNG(){
  const el=document.getElementById('carteirinha');
  const canvas=await html2canvas(el,{scale:3,useCORS:true,backgroundColor:'#f5f5f0'});
  const a=document.createElement('a');
  a.download='carteirinha.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}

async function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:[210,133]});
  const f=document.getElementById('card-frente');
  const c1=await html2canvas(f,{scale:3,useCORS:true,backgroundColor:'#f5f5f0'});
  pdf.addImage(c1.toDataURL('image/png'),'PNG',0,0,105,66);
  const v=document.getElementById('card-verso');
  const c2=await html2canvas(v,{scale:3,useCORS:true,backgroundColor:'#f5f5f0'});
  pdf.addImage(c2.toDataURL('image/png'),'PNG',105,0,105,66);
  pdf.save('carteirinha.pdf');
}

init();
</script>
</body>
</html>
