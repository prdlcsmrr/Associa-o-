<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteirinha Funcional</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#888; font-family:'Arial',sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; min-height:100vh; }

.controls {
  background:#1a2a5e; border-radius:12px; padding:14px 20px;
  display:flex; gap:10px; align-items:center; margin-bottom:20px;
  flex-wrap:wrap; justify-content:center;
}
.controls h2 { color:#c9972a; font-size:15px; font-weight:800; }
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; text-transform:uppercase; }
.btn-gold { background:#c9972a; color:#000; }
.btn-navy { background:#fff; color:#1a2a5e; }
.btn-green { background:#2a7a38; color:#fff; }

#carteirinha { display:flex; flex-direction:column; gap:6px; }

/* CARD com imagem de fundo */
.card {
  position: relative;
  width: 700px;
  overflow: hidden;
}
.card-bg {
  width: 100%;
  display: block;
}

/* Dados sobrepostos — posicionados em % para escalar com a imagem */
.overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ═══ FRENTE ═══ */
.f-photo {
  position: absolute;
  left: 2.2%;
  top: 12%;
  width: 17%;
  aspect-ratio: 3/4;
  overflow: hidden;
  border: 1.5px solid #aaa;
  background: #ddd;
  display: flex; align-items: center; justify-content: center;
}
.f-photo img { width:100%; height:100%; object-fit:cover; }
.f-photo-ph { font-size:9px; color:#aaa; text-align:center; }

.f-mat-num {
  position: absolute;
  left: 3.5%;
  top: 67%;
  font-size: 1.8vw;
  font-weight: 800;
  color: #111;
}

.f-cargo-val {
  position: absolute;
  left: 22%;
  top: 34%;
  font-size: 1.5vw;
  font-weight: 800;
  color: #111;
  text-transform: uppercase;
}

.f-nome-val {
  position: absolute;
  left: 22%;
  top: 44%;
  font-size: 1.8vw;
  font-weight: 900;
  color: #111;
  text-transform: uppercase;
}

.f-cpf-val {
  position: absolute;
  left: 22%;
  top: 57%;
  font-size: 1.5vw;
  font-weight: 700;
  color: #111;
}

.f-exp-val {
  position: absolute;
  left: 57%;
  top: 57%;
  font-size: 1.5vw;
  font-weight: 700;
  color: #111;
}

.f-hash-val {
  position: absolute;
  left: 22%;
  top: 66%;
  font-size: 1.3vw;
  font-weight: 700;
  color: #111;
}

/* ═══ VERSO ═══ */
.v-filiacao-val {
  position: absolute;
  left: 19%;
  top: 17%;
  font-size: 1.3vw;
  font-weight: 700;
  color: #111;
  line-height: 1.4;
}

.v-naturalidade-val {
  position: absolute;
  left: 19%;
  top: 33%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-nasc-val {
  position: absolute;
  left: 19%;
  top: 46%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-cpf-val {
  position: absolute;
  left: 19%;
  top: 60%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-validade-val {
  position: absolute;
  left: 50%;
  top: 33%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-admissao-val {
  position: absolute;
  left: 50%;
  top: 46%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-municipio-val {
  position: absolute;
  left: 50%;
  top: 60%;
  font-size: 1.4vw;
  font-weight: 800;
  color: #111;
}

.v-situacao-val {
  position: absolute;
  left: 35%;
  top: 72%;
  font-size: 1.6vw;
  font-weight: 900;
  color: #111;
}

/* QR Code - posicionado sobre o QR do verso */
.v-qr {
  position: absolute;
  right: 3%;
  top: 10%;
  display: flex; flex-direction: column; align-items: center;
}
.v-qr img { width: 13vw; height: 13vw; }

.loading { color:#fff; font-size:16px; padding:40px; text-align:center; }
</style>
</head>
<body>

<div class="controls">
  <h2>🪪 CARTEIRINHA FUNCIONAL</h2>
  <button class="btn btn-navy" onclick="window.history.back()">← Voltar</button>
  <button class="btn btn-gold" onclick="downloadPNG()">⬇ PNG</button>
  <button class="btn btn-green" onclick="downloadPDF()">📄 PDF</button>
</div>

<div id="app"><div class="loading">⏳ Carregando...</div></div>

<script>
const DB = 'https://prdlcsmrr.github.io/Associa-o-/db.json';
const BIN = '6a35c2ddda38895dfee044d5';
const BASE = 'https://prdlcsmrr.github.io/Associa-o-';

function fmt(d){if(!d)return'—';return new Date(d+'T12:00').toLocaleDateString('pt-BR');}

async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){show('❌ ID não fornecido');return;}
  let m=null;
  try{const r=await fetch(DB+'?t='+Date.now());if(r.ok){const d=await r.json();m=d.membros?.find(x=>x.numCred===id);}}catch(e){}
  if(!m){
    try{
      const k=['$2a','$10','$/ZpcJaiH2sQlYIOgef9HUeF8XyuxR7ixmFI8D1oGVTnlkiJn77DJ2'].join('');
      const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':k,'X-Bin-Meta':'false'}});
      if(r.ok){const d=await r.json();m=d.membros?.find(x=>x.numCred===id);}
    }catch(e){}
  }
  if(!m){show('❌ Membro não encontrado');return;}
  render(m);
}

function show(msg){document.getElementById('app').innerHTML='<div class="loading">'+msg+'</div>';}

function render(m){
  const qrUrl='https://prdlcsmrr.github.io/Associa-o-/verificar.html?id='+encodeURIComponent(m.numCred);
  const qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=cc0000&bgcolor=ffffff&data='+encodeURIComponent(qrUrl);
  const filiacao=[m.pai?'Pai: '+m.pai:'', m.mae?'Mãe: '+m.mae:''].filter(Boolean).join('<br>')||'—';

  document.getElementById('app').innerHTML=`
  <div id="carteirinha">

    <!-- FRENTE -->
    <div class="card" id="card-frente">
      <img class="card-bg" src="${BASE}/frente.jpg" crossorigin="anonymous">
      <div class="overlay">
        <div class="f-photo">
          ${m.foto?`<img src="${m.foto}" alt="">`:'<div class="f-photo-ph">👤</div>'}
        </div>
        <div class="f-mat-num">${m.numCred.replace('ASC-','')}</div>
        <div class="f-cargo-val">${m.cat.toUpperCase()}</div>
        <div class="f-nome-val">${m.nome}</div>
        <div class="f-cpf-val">${m.cpf}</div>
        <div class="f-exp-val">${fmt(m.emissao)}</div>
        <div class="f-hash-val">${m.docId}</div>
      </div>
    </div>

    <!-- VERSO -->
    <div class="card" id="card-verso">
      <img class="card-bg" src="${BASE}/verso.jpg" crossorigin="anonymous">
      <div class="overlay">
        <div class="v-filiacao-val">${filiacao}</div>
        <div class="v-naturalidade-val">${m.naturalidade||'BRASILEIRO'}</div>
        <div class="v-nasc-val">${fmt(m.nasc)}</div>
        <div class="v-cpf-val">${m.cpf} / ${m.rgUf||'—'}</div>
        <div class="v-validade-val">${fmt(m.validade)}</div>
        <div class="v-admissao-val">${fmt(m.emissao)}</div>
        <div class="v-municipio-val">${m.municipio||'—'}</div>
        <div class="v-situacao-val" style="color:${m.status==='Ativo'?'#000':'#cc0000'}">${m.status==='Ativo'?'ATIVO':'INATIVO'}</div>
        <div class="v-qr">
          <img src="${qrSrc}" crossorigin="anonymous">
        </div>
      </div>
    </div>

  </div>`;
}

async function downloadPNG(){
  const el=document.getElementById('carteirinha');
  const canvas=await html2canvas(el,{scale:3,useCORS:true,allowTaint:true});
  const a=document.createElement('a');
  a.download='carteirinha.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}

async function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const f=document.getElementById('card-frente');
  const c1=await html2canvas(f,{scale:3,useCORS:true,allowTaint:true});
  const w=210, h1=(c1.height*210)/c1.width;
  pdf.addImage(c1.toDataURL('image/png'),'PNG',0,0,w,h1);
  const v=document.getElementById('card-verso');
  const c2=await html2canvas(v,{scale:3,useCORS:true,allowTaint:true});
  const h2=(c2.height*210)/c2.width;
  pdf.addPage();
  pdf.addImage(c2.toDataURL('image/png'),'PNG',0,0,w,h2);
  pdf.save('carteirinha.pdf');
}

init();
</script>
</body>
</html>
