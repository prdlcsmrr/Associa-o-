<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteirinha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#888; font-family:'Arial',sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; min-height:100vh; }

.controls {
  background:#1a2a5e; border-radius:12px; padding:14px 20px;
  display:flex; gap:10px; align-items:center; margin-bottom:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.3); flex-wrap:wrap; justify-content:center;
}
.controls h2 { color:#c9972a; font-size:15px; font-weight:800; }
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
.btn-gold { background:#c9972a; color:#000; }
.btn-navy { background:#fff; color:#1a2a5e; }
.btn-green { background:#2a7a38; color:#fff; }

/* WRAPPER — frente e verso lado a lado */
#carteirinha {
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:center;
}

/* CARD BASE */
.card {
  width: 680px;
  height: 430px;
  position: relative;
  overflow: hidden;
  background: #f0f0ec;
  font-family: Arial, sans-serif;
}

/* FAIXA DIAGONAL BANDEIRA */
.bandeira {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.bandeira::before {
  content: '';
  position: absolute;
  top: -40px; left: -60px;
  width: 280px; height: 520px;
  background: linear-gradient(
    135deg,
    transparent 0%,
    rgba(0,150,57,0.25) 20%,
    rgba(0,150,57,0.3) 35%,
    rgba(255,220,0,0.3) 50%,
    rgba(0,39,118,0.25) 70%,
    transparent 85%
  );
  transform: rotate(-10deg);
}

/* MARCA D'ÁGUA TREM */
.watermark {
  position: absolute;
  right: -20px; bottom: 20px;
  font-size: 120px;
  opacity: 0.06;
  transform: rotate(-5deg);
  z-index: 0;
  pointer-events: none;
}

/* ══ FRENTE ══════════════════════════════ */

/* HEADER FRENTE */
.f-header {
  position: absolute;
  top: 10px; left: 145px; right: 10px;
  text-align: center;
  z-index: 2;
}
.f-rep { font-size: 9px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; text-transform: uppercase; }
.f-org { font-size: 14px; font-weight: 900; color: #cc0000; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.2; }
.f-sub { font-size: 8px; font-weight: 700; color: #1a1a1a; text-transform: uppercase; margin-top: 2px; }
.f-cnpj { font-size: 9px; color: #333; margin-top: 2px; }

/* FOTO */
.f-photo {
  position: absolute;
  left: 12px; top: 10px;
  width: 105px; height: 140px;
  border: 1.5px solid #aaa;
  background: #ddd;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.f-photo img { width:100%; height:100%; object-fit:cover; }
.f-photo-ph { font-size:9px; color:#aaa; text-align:center; }

/* MATRÍCULA */
.f-matricula {
  position: absolute;
  left: 10px; top: 155px;
  width: 110px;
  text-align: center;
  z-index: 2;
}
.f-mat-lbl { font-size: 7.5px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.3px; }
.f-mat-num { font-size: 12px; font-weight: 800; color: #111; }

/* LOGO EMBAIXO DA FOTO */
.f-logo {
  position: absolute;
  left: 10px; top: 190px;
  width: 110px;
  display: flex; align-items: center; gap: 5px;
  z-index: 2;
}
.f-logo-icon { font-size: 28px; }
.f-logo-text { font-size: 16px; font-weight: 900; color: #1a2a5e; letter-spacing: 1px; }

/* DADOS FRENTE */
.f-data {
  position: absolute;
  left: 130px; top: 100px; right: 12px;
  z-index: 2;
}
.fd-lbl { font-size: 8px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 8px; margin-bottom: 1px; }
.fd-lbl:first-child { margin-top: 0; }
.fd-val { font-size: 11px; font-weight: 800; color: #111; line-height: 1.2; }
.fd-val.lg { font-size: 13px; }
.fd-row { display: flex; gap: 20px; }
.fd-col { flex: 1; }

/* RODAPÉ FRENTE */
.f-footer {
  position: absolute;
  bottom: 6px; left: 10px; right: 10px;
  text-align: center;
  z-index: 2;
  border-top: 1px solid #ccc;
  padding-top: 5px;
}
.f-footer p { font-size: 6.5px; color: #333; line-height: 1.5; font-weight: 600; }

/* ══ VERSO ══════════════════════════════ */

/* TEXTO TOPO VERSO */
.v-top {
  position: absolute;
  top: 8px; left: 10px; right: 10px;
  text-align: center;
  z-index: 2;
  border-bottom: 1px solid #ccc;
  padding-bottom: 6px;
}
.v-top p { font-size: 7px; color: #111; line-height: 1.6; font-weight: 600; }

/* DADOS VERSO */
.v-data {
  position: absolute;
  top: 55px; left: 10px; right: 150px;
  z-index: 2;
}
.vd-lbl { font-size: 8px; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 7px; margin-bottom: 1px; }
.vd-lbl:first-child { margin-top: 0; }
.vd-val { font-size: 10px; font-weight: 700; color: #111; line-height: 1.3; }
.v-row { display: flex; gap: 16px; margin-top: 7px; }
.v-col { flex: 1; }

/* DIGITAL */
.v-digital {
  position: absolute;
  bottom: 55px; left: 10px;
  width: 65px; height: 65px;
  border: 1px solid #999;
  background: #f5f5f5;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  font-size: 38px;
  filter: grayscale(1);
}

/* ASSINATURAS */
.v-sigs {
  position: absolute;
  bottom: 35px; left: 82px; right: 155px;
  z-index: 2;
}
.v-sig-line { border-bottom: 1px solid #555; margin-bottom: 3px; height: 30px; }
.v-sig-lbl { font-size: 6.5px; color: #333; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

/* QR CODE */
.v-qr {
  position: absolute;
  top: 50px; right: 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  z-index: 2;
}
.v-qr img { width: 90px; height: 90px; }
.v-qr-lbl { font-size: 7px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

/* BRASÃO CIDADE */
.v-brasao {
  position: absolute;
  bottom: 45px; right: 8px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  z-index: 2;
}
.v-brasao-icon { font-size: 32px; }
.v-cidade { font-size: 7px; font-weight: 700; color: #1a2a5e; text-transform: uppercase; letter-spacing: 0.3px; text-align: center; }

/* RODAPÉ VERSO */
.v-footer {
  position: absolute;
  bottom: 6px; left: 10px; right: 10px;
  text-align: center;
  z-index: 2;
  border-top: 1px solid #ccc;
  padding-top: 4px;
}
.v-footer p { font-size: 6.5px; color: #333; line-height: 1.5; font-weight: 600; }

.loading { color:#fff; font-size:16px; padding:40px; text-align:center; }
</style>
</head>
<body>

<div class="controls">
  <h2>🪪 CARTEIRINHA FUNCIONAL</h2>
  <button class="btn btn-navy" onclick="window.history.back()">← Voltar</button>
  <button class="btn btn-gold" onclick="downloadPNG()">⬇ PNG</button>
  <button class="btn btn-green" onclick="downloadPDF()">📄 PDF</button>
</div>

<div id="app">
  <div class="loading">⏳ Carregando...</div>
</div>

<script>
const DB_GITHUB = 'https://prdlcsmrr.github.io/Associa-o-/db.json';
const BIN_ID = '6a35c2ddda38895dfee044d5';

function fmt(d){ if(!d)return'—'; return new Date(d+'T12:00').toLocaleDateString('pt-BR'); }

async function init(){
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ document.getElementById('app').innerHTML='<div class="loading">❌ ID não fornecido</div>'; return; }

  let m = null;
  try{
    const r = await fetch(DB_GITHUB+'?t='+Date.now());
    if(r.ok){ const data=await r.json(); m=data.membros?.find(x=>x.numCred===id); }
  }catch(e){}
  if(!m){
    try{
      const k=['$2a','$10','$/ZpcJaiH2sQlYIOgef9HUeF8XyuxR7ixmFI8D1oGVTnlkiJn77DJ2'].join('');
      const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':k,'X-Bin-Meta':'false'}});
      if(r.ok){ const data=await r.json(); m=data.membros?.find(x=>x.numCred===id); }
    }catch(e){}
  }
  if(!m){ document.getElementById('app').innerHTML='<div class="loading">❌ Membro não encontrado</div>'; return; }
  render(m);
}

function render(m){
  const cfg = JSON.parse(localStorage.getItem('assoc-config')||'{}');
  const orgNome = cfg.nomeAssoc || 'ASSOCIAÇÃO';
  const qrUrl = 'https://prdlcsmrr.github.io/Associa-o-/verificar.html?id='+encodeURIComponent(m.numCred);
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=90x90&color=cc0000&data='+encodeURIComponent(qrUrl);

  document.getElementById('app').innerHTML = `
  <div id="carteirinha">

    <!-- FRENTE -->
    <div class="card" id="card-frente">
      <div class="bandeira"></div>
      <div class="watermark">🚆</div>

      <div class="f-header">
        <div class="f-rep">República Federativa do Brasil</div>
        <div class="f-org">${orgNome}</div>
        <div class="f-sub">Sistema de Credencial Funcional</div>
        <div class="f-cnpj">${m.numCred}</div>
      </div>

      <div class="f-photo">
        ${m.foto ? `<img src="${m.foto}" alt="">` : '<div class="f-photo-ph">👤<br>Sem foto</div>'}
      </div>

      <div class="f-matricula">
        <div class="f-mat-lbl">Matrícula</div>
        <div class="f-mat-num">${m.numCred.replace('ASC-','')}</div>
      </div>

      <div class="f-logo">
        <span class="f-logo-icon">🏛️</span>
        <span class="f-logo-text">ASSOC</span>
      </div>

      <div class="f-data">
        <div class="fd-lbl">Cargo</div>
        <div class="fd-val lg">${m.cat.toUpperCase()}</div>

        <div class="fd-lbl">Nome</div>
        <div class="fd-val lg">${m.nome}</div>

        <div class="fd-row" style="margin-top:6px">
          <div class="fd-col">
            <div class="fd-lbl">CPF</div>
            <div class="fd-val">${m.cpf}</div>
          </div>
          <div class="fd-col">
            <div class="fd-lbl">Data da Expedição</div>
            <div class="fd-val">${fmt(m.emissao)}</div>
          </div>
        </div>

        <div class="fd-lbl">Código Hash</div>
        <div class="fd-val">${m.docId}</div>
      </div>

      <div class="f-footer">
        <p>TEM FÉ PÚBLICA E VALIDADE EM TODO O TERRITÓRIO NACIONAL<br>
        ART. 2º INCISO V DA LEI Nº 12.57 DE 2009; ART. 2º INCISO V DA 10.266, DE 2020</p>
      </div>
    </div>

    <!-- VERSO -->
    <div class="card" id="card-verso">
      <div class="bandeira"></div>
      <div class="watermark">🚆</div>

      <div class="v-top">
        <p>O TITULAR TEM LIVRE PORTE DE ARMA DE FOGO, COM VALIDADE EM ÂMBITO NACIONAL.<br>
        DECRETO Nº 1.655 DE 1995, LEI Nº 12.696, DE 2003, ART. 30 DO DECRETO Nº 3.647, DE 2019.</p>
      </div>

      <div class="v-data">
        <div class="vd-lbl">Filiação</div>
        <div class="vd-val">${m.obs||'—'}</div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">Naturalidade</div>
            <div class="vd-val">BRASILEIRO</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Validade</div>
            <div class="vd-val">${fmt(m.validade)}</div>
          </div>
        </div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">Data de Nascimento</div>
            <div class="vd-val">${fmt(m.nasc)}</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Data de Admissão</div>
            <div class="vd-val">${fmt(m.emissao)}</div>
          </div>
        </div>

        <div class="v-row">
          <div class="v-col">
            <div class="vd-lbl">CPF</div>
            <div class="vd-val">${m.cpf}</div>
          </div>
          <div class="v-col">
            <div class="vd-lbl">Município</div>
            <div class="vd-val">—</div>
          </div>
        </div>

        <div style="margin-top:8px">
          <div class="vd-lbl">Situação Funcional</div>
          <div class="vd-val" style="color:${m.status==='Ativo'?'#2a7a38':'#cc0000'};font-size:12px">${m.status==='Ativo'?'ATIVO':'INATIVO'}</div>
        </div>
      </div>

      <div class="v-digital">👆</div>

      <div class="v-sigs">
        <div class="v-sig-line"></div>
        <div class="v-sig-lbl">Diretor/Geral</div>
        <div class="v-sig-line" style="margin-top:8px"></div>
        <div class="v-sig-lbl">Assinatura</div>
      </div>

      <div class="v-qr">
        <img src="${qrSrc}" alt="QR" crossorigin="anonymous">
        <div class="v-qr-lbl">Base Legal</div>
      </div>

      <div class="v-brasao">
        <div class="v-brasao-icon">🏛️</div>
        <div class="v-cidade">${orgNome}</div>
      </div>

      <div class="v-footer">
        <p>TEM FÉ PÚBLICA E VALIDADE EM TODO O TERRITÓRIO NACIONAL<br>
        ART. 2º INCISO V DA LEI Nº 12.037 DE 2009; ART. 2º INCISO V DA 10.266, DE 2020</p>
      </div>
    </div>

  </div>`;
}

async function downloadPNG(){
  const el = document.getElementById('carteirinha');
  const canvas = await html2canvas(el, {scale:3, useCORS:true, backgroundColor:'#888'});
  const a = document.createElement('a');
  a.download = 'carteirinha.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

async function downloadPDF(){
  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF({orientation:'landscape', unit:'mm', format:[242,86]});

  const frente = document.getElementById('card-frente');
  const c1 = await html2canvas(frente, {scale:3, useCORS:true, backgroundColor:'#f0f0ec'});
  pdf.addImage(c1.toDataURL('image/png'),'PNG',0,0,121,86);

  const verso = document.getElementById('card-verso');
  const c2 = await html2canvas(verso, {scale:3, useCORS:true, backgroundColor:'#f0f0ec'});
  pdf.addImage(c2.toDataURL('image/png'),'PNG',121,0,121,86);

  pdf.save('carteirinha.pdf');
}

init();
</script>
</body>
</html>
