<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação de Credencial — PFF</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#f0f0f0;
  font-family:'Arial',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-bottom:40px;
}
.wrap {
  width:100%;
  max-width:600px;
  background:#fff;
  box-shadow:0 2px 20px rgba(0,0,0,0.15);
  min-height:100vh;
}

/* STATUS BAR */
.status-bar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid #eee;
}
.status-label { font-size:12px; font-weight:700; color:#444; letter-spacing:0.5px; }
.badge-ativo {
  display:flex; align-items:center; gap:8px;
  background:#2a7a38; color:#fff;
  padding:8px 16px; border-radius:8px;
  font-size:14px; font-weight:700; letter-spacing:1px;
}
.badge-inativo {
  display:flex; align-items:center; gap:8px;
  background:#b91c1c; color:#fff;
  padding:8px 16px; border-radius:8px;
  font-size:14px; font-weight:700; letter-spacing:1px;
}

/* PERFIL */
.perfil {
  display:flex;
  gap:16px;
  padding:16px;
  border-bottom:1px solid #eee;
}
.perfil-foto {
  width:130px;
  min-height:160px;
  flex-shrink:0;
  border-radius:4px;
  overflow:hidden;
  border:1px solid #ddd;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:6px;
  color:#bbb;
  font-size:11px;
}
.perfil-foto img { width:100%; height:100%; object-fit:cover; }
.perfil-info { flex:1; display:flex; flex-direction:column; gap:6px; }
.lbl { font-size:10px; font-weight:600; color:#888; letter-spacing:0.8px; text-transform:uppercase; }
.nome { font-size:18px; font-weight:900; color:#111; line-height:1.2; margin-bottom:2px; }
.mat-badge {
  display:inline-block;
  background:#1b2a5e;
  color:#fff;
  padding:3px 10px;
  border-radius:4px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.5px;
}
.porte { font-size:12px; color:#444; }
.porte strong { color:#111; }
.cargo-txt { font-size:13px; font-weight:700; color:#222; }
.situacao {
  font-size:13px; font-weight:700;
}
.situacao .ativo-txt { color:#2a7a38; }
.situacao .inativo-txt { color:#b91c1c; }

/* SEÇÕES */
.secao {
  border-top:2px solid #e8e8e8;
}
.secao-titulo {
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  background:#f5f5f5;
  font-size:13px;
  font-weight:900;
  color:#222;
  letter-spacing:0.5px;
  text-transform:uppercase;
  border-bottom:1px solid #e8e8e8;
}
.secao-body {
  padding:14px 16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 16px;
}
.campo { display:flex; flex-direction:column; gap:2px; }
.campo-lbl { font-size:10px; color:#888; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; }
.campo-val { font-size:15px; font-weight:700; color:#111; }
.campo-val.vermelho { color:#b91c1c; }

/* AUTENTICAÇÃO */
.auth-body {
  padding:14px 16px;
  display:flex;
  gap:16px;
  align-items:flex-start;
}
.auth-info { flex:1; display:flex; flex-direction:column; gap:10px; }
.auth-qr {
  width:100px;
  height:100px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.auth-qr img { width:100%; border:1px solid #eee; border-radius:4px; }
.auth-qr-label { font-size:9px; color:#888; font-weight:700; letter-spacing:0.5px; }

/* MARCA D'ÁGUA */
.watermark {
  position:relative;
  overflow:hidden;
}
.watermark::after {
  content:'';
  position:absolute;
  right:-20px; top:50%;
  transform:translateY(-50%);
  width:200px; height:200px;
  background:url('https://prdlcsmrr.github.io/Associa-o-/logo.png') center/contain no-repeat;
  opacity:0.04;
  pointer-events:none;
}

/* RODAPÉ */
.rodape {
  padding:12px 16px;
  text-align:center;
  font-size:10px;
  color:#888;
  border-top:1px solid #eee;
  line-height:1.5;
}

/* LOADING / ERROR */
.loading { padding:40px; text-align:center; color:#666; font-size:16px; }
.error-box { padding:32px 20px; text-align:center; }
.error-box h2 { color:#b91c1c; margin-bottom:8px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">⏳ Verificando credencial...</div>
</div>

<script>
const PRODUCTION_DOMAIN = false;
const BASE_DOMAIN = PRODUCTION_DOMAIN
  ? 'https://ubapff.org.br'
  : 'https://prdlcsmrr.github.io/Associa-o-';

function fmt(d){ if(!d) return '—'; return new Date(d+'T12:00').toLocaleDateString('pt-BR'); }
const DB_GITHUB = BASE_DOMAIN+'/db.json';
const BIN_ID = '6a35c2ddda38895dfee044d5';

function showErr(title, msg){
  document.getElementById('app').innerHTML = `
    <img src="https://prdlcsmrr.github.io/Associa-o-/header-pff.jpg" style="width:100%;display:block">
    <div class="error-box">
      <h2>❌ ${title}</h2>
      <p style="color:#666">${msg}</p>
    </div>`;
}

async function init(){
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ showErr('QR Code inválido','Este código não contém identificador.'); return; }

  try{
    const r = await fetch(DB_GITHUB+'?t='+Date.now());
    if(r.ok){
      const data = await r.json();
      const m = (data.membros||[]).find(x=>x.numCred===id);
      if(m){ render(m); return; }
    }
  }catch(e){}

  try{
    const KEY = ['$2a','$10','$/ZpcJaiH2sQlYIOgef9HUeF8XyuxR7ixmFI8D1oGVTnlkiJn77DJ2'].join('');
    const r = await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{
      headers:{'X-Master-Key':KEY,'X-Bin-Meta':'false'}
    });
    if(r.ok){
      const data = await r.json();
      const m = (data.membros||[]).find(x=>x.numCred===id);
      if(m){ render(m); return; }
    }
  }catch(e){}

  showErr('Não encontrado','Nenhum membro com este código foi localizado.');
}

function render(m){
  const ativo = m.status === 'Ativo';

  // Verificar se credencial está expirada
  let expirada = false;
  if(m.validade){
    const valDate = new Date(m.validade+'T23:59:59');
    expirada = valDate < new Date();
  }
  const statusFinal = ativo && !expirada;

  const qrUrl = BASE_DOMAIN+(PRODUCTION_DOMAIN?'/registrofuncional':'/verificar.html')+'?id='+encodeURIComponent(m.numCred);
  const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}&margin=4&color=1b2a5e`;

  document.getElementById('app').innerHTML = `
    <!-- HEADER OFICIAL -->
    <div style="width:100%;line-height:0">
      <img src="https://prdlcsmrr.github.io/Associa-o-/header-pff.jpg"
        style="width:100%;display:block;object-fit:cover"
        alt="Polícia Ferroviária Federal">
    </div>

    <!-- STATUS -->
    <div class="status-bar">
      <span class="status-label">STATUS DA CREDENCIAL:</span>
      <span class="${statusFinal?'badge-ativo':'badge-inativo'}">
        ${statusFinal?'✅':'❌'} ${statusFinal?'CREDENCIAL ATIVA':'CREDENCIAL INATIVA'}
      </span>
    </div>

    <!-- PERFIL -->
    <div class="perfil watermark">
      <div class="perfil-foto">
        ${m.foto
          ? `<img src="${m.foto}" alt="${m.nome}">`
          : `<svg width="48" height="48" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Sem foto</span>`
        }
      </div>
      <div class="perfil-info">
        <div>
          <div class="lbl">Nome:</div>
          <div class="nome">${(m.nome||'').toUpperCase()}</div>
        </div>
        <div>
          <div class="lbl">Matrícula Funcional:</div>
          <span class="mat-badge">${m.numCred||'—'}</span>
        </div>
        <div class="porte">PORTE DE ARMA: <strong>HABILITADO</strong></div>
        <div>
          <div class="lbl">Cargo:</div>
          <div class="cargo-txt">${(m.cat||'—').toUpperCase()}</div>
        </div>
        <div class="situacao">
          SITUAÇÃO FUNCIONAL: <span class="${statusFinal?'ativo-txt':'inativo-txt'}">${statusFinal?'ATIVO':'INATIVO'}</span>
        </div>
      </div>
    </div>

    <!-- DADOS PESSOAIS -->
    <div class="secao">
      <div class="secao-titulo">👤 Dados Pessoais</div>
      <div class="secao-body">
        <div class="campo">
          <div class="campo-lbl">Data de Nascimento:</div>
          <div class="campo-val">${fmt(m.nasc)}</div>
        </div>
        <div class="campo">
          <div class="campo-lbl">Nacionalidade:</div>
          <div class="campo-val">${(m.naturalidade||'BRASILEIRO').toUpperCase()}</div>
        </div>
        <div class="campo" style="grid-column:1">
          <div class="campo-lbl">Filiação:</div>
          <div class="campo-val" style="font-size:13px">
            ${m.pai ? `Pai: <strong>${m.pai}</strong>` : ''}
            ${m.mae ? `<br>Mãe: <strong>${m.mae}</strong>` : ''}
            ${!m.pai && !m.mae ? '—' : ''}
          </div>
        </div>
        <div class="campo">
          <div class="campo-lbl">CPF:</div>
          <div class="campo-val">${m.cpf||'—'}</div>
        </div>
        ${m.municipio ? `
        <div class="campo">
          <div class="campo-lbl">Município:</div>
          <div class="campo-val">${m.municipio.toUpperCase()}</div>
        </div>` : ''}
        ${m.tel ? `
        <div class="campo">
          <div class="campo-lbl">Telefone:</div>
          <div class="campo-val">${m.tel}</div>
        </div>` : ''}
      </div>
    </div>

    <!-- DADOS DA CREDENCIAL -->
    <div class="secao">
      <div class="secao-titulo">🪪 Dados da Credencial</div>
      <div class="secao-body">
        <div class="campo">
          <div class="campo-lbl">Número:</div>
          <div class="campo-val">${m.numCred||'—'}</div>
        </div>
        <div class="campo">
          <div class="campo-lbl">Emissão:</div>
          <div class="campo-val">${fmt(m.emissao)}</div>
        </div>
        <div class="campo" style="grid-column:2">
          <div class="campo-lbl">Validade:</div>
          <div class="campo-val ${expirada?'vermelho':''}">${fmt(m.validade)}${expirada?' ⚠️ EXPIRADA':''}</div>
        </div>
      </div>
    </div>

    <!-- CÓDIGO DE AUTENTICAÇÃO -->
    <div class="secao">
      <div class="secao-titulo">▦ Código de Autenticação</div>
      <div class="auth-body">
        <div class="auth-info">
          <div class="campo">
            <div class="campo-lbl">ID Documentação:</div>
            <div class="campo-val" style="font-size:14px">${m.docId||'—'}</div>
          </div>
          <div class="campo">
            <div class="campo-lbl">Hash:</div>
            <div class="campo-val" style="font-size:14px">${(m.hash||m.docId||'—').toString().slice(0,8).toUpperCase()}</div>
          </div>
          <div style="font-size:10px;color:#888;margin-top:4px">
            Verificado em: ${new Date().toLocaleString('pt-BR')}
          </div>
        </div>
        <div class="auth-qr">
          <img src="${qrImg}" alt="QR Code">
          <div class="auth-qr-label">BASE LEGAL</div>
        </div>
      </div>
    </div>

    <!-- RODAPÉ -->
    <div class="rodape">
      TEM FÉ PÚBLICA E VALIDADE EM TODO O TERRITÓRIO NACIONAL<br>
      ART. 2º INCISO V DA LEI Nº 12.57 DE 2009 · ART. 2º INCISO V DA 10.266, DE 2020
    </div>`;
}

init();
</script>
</body>
</html>
