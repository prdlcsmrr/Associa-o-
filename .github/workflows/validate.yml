name: Validação de Qualidade

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  html-validation:
    name: Validação HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar html-validate
        run: npm install -g html-validate

      - name: Listar arquivos HTML a validar
        id: list
        run: |
          files=$(find . -maxdepth 2 -name "*.html" \
            ! -name "BACKUP_*" \
            ! -name "index_backup.html" \
            | sort)
          echo "Arquivos encontrados:"
          echo "$files"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validar HTML
        run: |
          EXIT=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────"
            echo "Validando: $file"
            html-validate "$file" || EXIT=1
          done <<< "$(find . -maxdepth 2 -name '*.html' ! -name 'BACKUP_*' ! -name 'index_backup.html' | sort)"
          exit $EXIT

  accessibility:
    name: Checks de Acessibilidade
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar pa11y
        run: npm install -g pa11y

      - name: Iniciar servidor local
        run: |
          npm install -g serve
          serve -s . -l 8080 &
          sleep 3

      - name: Checar acessibilidade das páginas principais
        run: |
          EXIT=0
          PAGES="index.html carteirinha.html cadastro-membro.html verificar.html"
          for page in $PAGES; do
            if [ -f "$page" ]; then
              echo "──────────────────────────────────"
              echo "Checando acessibilidade: $page"
              pa11y --standard WCAG2AA --reporter cli "http://localhost:8080/$page" || EXIT=1
            fi
          done
          exit $EXIT
